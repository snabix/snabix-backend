[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
user = snabix
group = snabix
listen = 9000
listen.owner = snabix
listen.group = snabix
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
ping.path = /fpm-ping
access.log = /proc/self/fd/2
